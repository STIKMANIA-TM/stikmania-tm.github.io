<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-es="Política de Privacidad | STIKMANIA" data-en="Privacy Policy | STIKMANIA">Política de Privacidad | STIKMANIA</title>
    <meta name="description" content="Política de privacidad de STIKMANIA. Cómo protegemos tus datos personales.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="shortcut icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pirata+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00FF00;
            --dark-green: #003300;
            --black: #000000;
            --white: #FFFFFF;
            --gray: #1a1a1a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--black);
            color: var(--white);
            line-height: 1.8;
            padding: 100px 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        h1 {
            font-family: 'Pirata One', display;
            color: var(--neon-green);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        h2 {
            font-family: 'Inter', sans-serif;
            color: var(--neon-green);
            font-size: 1.5rem;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .last-update {
            text-align: center;
            color: var(--neon-green);
            margin-bottom: 40px;
            font-size: 0.9rem;
        }
        
        p { margin-bottom: 20px; color: #ccc; }
        ul, ol { margin-bottom: 20px; padding-left: 30px; color: #ccc; }
        li { margin-bottom: 10px; }
        a { color: var(--neon-green); }
        a:hover { text-decoration: underline; }
        
        .back-link {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 24px;
            background: var(--neon-green);
            color: var(--black);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .back-link:hover { background: var(--white); text-decoration: none; }
        
        /* LANGUAGE SWITCHER */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }
        
        .lang-btn {
            background: var(--black);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 16px;
            border-radius: 4px
